<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>JS → Word Converter</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 300px;
      margin-top: 10px;
      font-family: Consolas, monospace;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>

  <!-- docx -->
  <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>

</head>

<body>

<h1>Convertisseur JS → Word</h1>

<p>Importe un fichier JS :</p>
<input type="file" id="fileInput" accept=".js">

<p>Aperçu :</p>
<textarea id="preview"></textarea>

<br>
<button onclick="generateWord()">Télécharger Word</button>

<script>
let jsCode = "";

// Lecture fichier JS
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(event) {
    jsCode = event.target.result;
    document.getElementById("preview").value = jsCode;
  };

  reader.readAsText(file);
});

// Génération + téléchargement Word
async function generateWord() {
  if (!jsCode) {
    alert("Importe un fichier JS d'abord !");
    return;
  }

  const { Document, Packer, Paragraph, TextRun } = window.docx;

  const lines = jsCode.split("\n");

  const doc = new Document({
    sections: [
      {
        children: lines.map(line =>
          new Paragraph({
            children: [
              new TextRun({
                text: line,
                font: "Courier New"
              })
            ]
          })
        )
      }
    ]
  });

  // 👉 Génération du fichier Word
  const blob = await Packer.toBlob(doc);

  // 👉 Téléchargement automatique
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "code-js.docx";
  document.body.appendChild(a);
  a.click();

  // nettoyage
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
