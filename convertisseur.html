<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>JS → Word Converter</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 300px;
      font-family: Consolas, monospace;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      cursor: pointer;
      font-size: 16px;
    }

    input {
      margin-top: 10px;
    }
  </style>

  <!-- Librairie docx (version navigateur stable) -->
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
</head>

<body>

<h1>Convertisseur JavaScript → Word</h1>

<p>📂 Importer un fichier .js :</p>
<input type="file" id="fileInput" accept=".js">

<p>👀 Aperçu du code :</p>
<textarea id="preview"></textarea>

<br>

<button onclick="convertToWord()">📄 Télécharger en Word</button>

<script>
let jsCode = "";

// Charger fichier JS
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(event) {
    jsCode = event.target.result;
    document.getElementById("preview").value = jsCode;
  };

  reader.readAsText(file);
});

// Conversion + téléchargement Word
async function convertToWord() {
  if (!jsCode) {
    alert("Veuillez importer un fichier JS !");
    return;
  }

  const { Document, Packer, Paragraph, TextRun } = window.docx;

  const lines = jsCode.split("\n");

  const doc = new Document({
    sections: [
      {
        children: lines.map(line =>
          new Paragraph({
            children: [
              new TextRun({
                text: line,
                font: "Courier New"
              })
            ]
          })
        )
      }
    ]
  });

  const blob = await Packer.toBlob(doc);

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "code-js.docx";
  document.body.appendChild(a);
  a.click();

  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
